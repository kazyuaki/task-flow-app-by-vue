services:
  php:
    build: ./docker/php
    volumes:
      - ./api:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8000:80"
    volumes:
      - ./api:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: TaskFlow_MySQL_2026!
    ports:
      - "3307:3306"
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf

  node:
    build:
      context: ./node
      dockerfile: ../docker/node/Dockerfile
    working_dir: /app
    volumes:
      - ./node:/app
      - /app/node_modules
    environment:
      NUXT_PUBLIC_API_BASE_URL: https://taskflow-app-kazu.com/api
    ports:
      - "3000:3000"
    command: sh -c "npm ci && npm run build && node .output/server/index.mjs"
    stdin_open: true
    tty: true
