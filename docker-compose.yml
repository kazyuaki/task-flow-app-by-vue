services:
  php:
    build: ./docker/php
    volumes:
      - ./api:/var/www
    depends_on:
      - db
      - mailhog

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8000:80"
    volumes:
      - ./api:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf

  phpmyadmin:
    image: phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

  node:
    build:
      context: ./node
      dockerfile: ../docker/node/Dockerfile
    working_dir: /app
    volumes:
      - ./node:/app
      - /app/node_modules
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
      - "24678:24678"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    stdin_open: true
    tty: true
